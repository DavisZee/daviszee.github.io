<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Alpine Trip Forecaster</title>
        <link rel="stylesheet" href="css/styles.css">
        <script src="./script.js" defer></script>
        <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCiOBimKks___n8Jfo9uxRa9prmN7S5WMI&libraries=places&callback=initAutocomplete" async defer></script>
        <script src="https://smtpjs.com/v3/smtp.js"></script>
    </head>
    <body>
        <!--Need to fix this menu-->
        <nav class="navbar">
            <a class="nav-logo" href="index.html">Davis Zhong</a>
            <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li class="dropdown">
                <button class="dropdown-toggle">Pages ▾</button>
                <ul class="dropdown-menu">
                <li><a href="project1.html">Projects</a></li>
                </ul>
            </li>
            </ul>
        </nav>
        <!------------------------>
        <div style="height: 100vh; overflow: auto;">
            <div class="card">
                <h1>Alpine Trip Forecaster</h1>
                <div class="coordinates">
                    <div class="row">
                        <div class="col-md-6 text-center">
                            <label for="coordinate-bar-lng" style="display: inline-block; text-align: left;">Longitude:</label>
                            <input type="number" id="coordinate-bar-lng" class="coordinate-bar" placeholder="Enter the longitude" value="-121.4123853">
                        </div>
                        <div class="col-md-6 text-center" style="margin-left: 10px;">
                            <label for="coordinate-bar-lat" style="display: inline-block; text-align: left;">Latitude:</label>
                            <input type="number" id="coordinate-bar-lat" class="coordinate-bar" placeholder="Enter the latitude" value="47.4077515">
                        </div>
                    </div>
                    <p>or</p>
                    <div class="row">
                        <input type="text" class="search-bar" id="search-bar" placeholder="Enter a place">
                        <button id="search-btn" class="button">Add<svg stroke="currentColor" fill="currentColor" stroke-width="0" viewBox="0 0 1024 1024" height="1.5em"
                            width="1.5em" xmlns="http://www.w3.org/2000/svg">
                            <path
                            d="M909.6 854.5L649.9 594.8C690.2 542.7 712 479 712 412c0-80.2-31.3-155.4-87.9-212.1-56.6-56.7-132-87.9-212.1-87.9s-155.5 31.3-212.1 87.9C143.2 256.5 112 331.8 112 412c0 80.1 31.3 155.5 87.9 212.1C256.5 680.8 331.8 712 412 712c67 0 130.6-21.8 182.7-62l259.7 259.6a8.2 8.2 0 0 0 11.6 0l43.6-43.5a8.2 8.2 0 0 0 0-11.6zM570.4 570.4C528 612.7 471.8 636 412 636s-116-23.3-158.4-65.6C211.3 528 188 471.8 188 412s23.3-116.1 65.6-158.4C296 211.3 352.2 188 412 188s116.1 23.2 158.4 65.6S636 352.2 636 412s-23.3 116.1-65.6 158.4z">
                            </path>
                        </svg>
                        </button>
                    </div>
                    
                </div>
                <div style="margin-top: 30px;">
                    <strong style="display: flex; flex: 1;">Forecast Dates:</strong>
                    <div class="row">
                        <div class="col-sm-6" style="display: flex; flex-direction: column; align-items: center;">
                            <label for="start-date" style="margin-bottom: 0;">Start Date:</label>
                            <input type="date" id="start-date" name="start-date" required style="margin-top: 0;">
                        </div>
                        <div class="col-sm-6" style="display: flex; flex-direction: column; align-items: center;">
                            <label for="end-date" style="margin-bottom: 0;">End Date:</label>
                            <input type="date" id="end-date" name="end-date" required style="margin-top: 0;">
                        </div>
                    </div>
                </div>

            </div>

            <div class="display">
                
                <table id="weatherTable">
                    <thead id="tableHead">
                        <tr>
                            <th>Location</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">

                    </tbody>
                </table>
                <button id="update-btn">Update</button>
                
            </div>
            
            <div class="card-left">
                <div id="centered-item" style="padding-top: 20px;">
                    <h2 style="color: white;">Share Your Forecasts!</h2>
                </div>
                <form id="email-form" method="POST">
                    <label for="subject">Subject:</label>
                    <input type="text" id="subject" name="subject"><br><br>
                    <label for="recipient-email">Recipient Email:</label>
                    <input type="email" id="recipient-email" name="recipient-email" required>
                    <label for="message">Message:</label><br>
                    <textarea id="message" name="message" rows="4" cols="50"></textarea><br><br>
                    <button type="submit" id="email-btn">Send Email</button>
                  </form>
            </div>
        </div>
    </body>
</html>
